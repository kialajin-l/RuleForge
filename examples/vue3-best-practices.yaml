meta:
  id: vue3-reactive-data
  name: Vue 3 Reactive Data Best Practices
  version: 1.0.0
  description: "Use ref() for primitive values and reactive() for objects in Vue 3 composition API"
  authors: ["david"]
  license: MIT
  tags: ["vue3", "reactive", "ref", "composition-api"]

rule:
  trigger:
    keywords: ["reactive", "ref", "computed"]
    file_pattern: "**/*.vue"
    language: "typescript"
    
  conditions:
    - type: "code_pattern"
      pattern: "reactive\\(\\s*[0-9]+\\s*\\)"
      negated: false
      
    - type: "code_pattern"
      pattern: "ref\\(\\s*\\{[^}]*\\}\\s*\\)"
      negated: false
      
  suggestions:
    - description: "Use ref() for primitive values instead of reactive()"
      code: |
        // Before
        const count = reactive(0)
        
        // After
        const count = ref(0)
      priority: "high"
      
    - description: "Use reactive() for objects and ref() for primitives"
      code: |
        // Correct usage
        const user = reactive({
          name: 'John',
          age: 30
        })
        
        const count = ref(0)
        const message = ref('Hello')
      priority: "medium"
      
    - description: "Use toRef() and toRefs() for reactive object properties"
      code: |
        const user = reactive({
          name: 'John',
          age: 30
        })
        
        // Destructure with toRefs
        const { name, age } = toRefs(user)
        
        // Or create individual refs
        const userName = toRef(user, 'name')
      priority: "medium"

compatibility:
  languages: ["typescript"]
  frameworks: ["vue"]
  rep_version: "^1.0"
