meta:
  id: vue3-composables-naming
  name: Vue 3 Composables Naming Convention
  version: 1.0.0
  description: "Follow Vue 3 composable function naming convention (useXxx) for better code organization and discoverability"
  authors: ["charlie"]
  license: MIT
  tags: ["vue3", "composables", "naming", "convention"]

rule:
  trigger:
    keywords: ["function", "const", "export"]
    file_pattern: "**/*.ts"
    language: "typescript"
    context: "Vue 3 composable function definition"
    
  conditions:
    - type: "code_pattern"
      pattern: "export\\s+(?:function|const)\\s+[a-z][a-zA-Z]*"
      negated: false
      
    - type: "code_pattern"
      pattern: "export\\s+(?:function|const)\\s+use[A-Z][a-zA-Z]*"
      negated: true
      
  suggestions:
    - description: "Rename composable function to follow useXxx naming convention"
      code: |
        // Before
        export function fetchData() {
          // implementation
        }
        
        // After
        export function useFetchData() {
          // implementation
        }
      priority: "high"
      
    - description: "Add proper TypeScript types to composable function"
      code: |
        interface UseFetchDataReturn {
          data: Ref<any>
          loading: Ref<boolean>
          error: Ref<Error | null>
          execute: () => Promise<void>
        }
        
        export function useFetchData(url: string): UseFetchDataReturn {
          const data = ref(null)
          const loading = ref(false)
          const error = ref<Error | null>(null)
          
          async function execute() {
            // implementation
          }
          
          return { data, loading, error, execute }
        }
      priority: "medium"

compatibility:
  languages: ["typescript"]
  frameworks: ["vue"]
  rep_version: "^1.0"
