meta:
  id: vue3-composition-reusability
  name: Vue 3 Composition Function Reusability
  version: 1.0.0
  description: "Create reusable composition functions with proper parameterization and return types"
  authors: ["isabella"]
  license: MIT
  tags: ["vue3", "composition", "reusability", "hooks"]

rule:
  trigger:
    keywords: ["function", "export", "return"]
    file_pattern: "**/composables/**/*.ts"
    language: "typescript"
    
  conditions:
    - type: "code_pattern"
      pattern: "export\\s+function\\s+[a-zA-Z]+\\s*\\([^)]*\\)\\s*\\{"
      negated: false
      
  suggestions:
    - description: "Create parameterized composable functions with flexible options"
      code: |
        interface UseFetchOptions {
          immediate?: boolean
          timeout?: number
          retryCount?: number
        }
        
        export function useFetch<T>(url: string, options: UseFetchOptions = {}) {
          const data = ref<T | null>(null)
          const loading = ref(false)
          const error = ref<Error | null>(null)
          
          async function execute() {
            loading.value = true
            error.value = null
            
            try {
              const response = await fetch(url, {
                signal: AbortSignal.timeout(options.timeout || 5000)
              })
              data.value = await response.json()
            } catch (err) {
              error.value = err as Error
            } finally {
              loading.value = false
            }
          }
          
          // Auto-execute if immediate is true
          if (options.immediate) {
            execute()
          }
          
          return {
            data: readonly(data),
            loading: readonly(loading),
            error: readonly(error),
            execute
          }
        }
      priority: "high"
      
    - description: "Use generics for type-safe composable functions"
      code: |
        export function useLocalStorage<T>(key: string, defaultValue: T) {
          const data = ref<T>(defaultValue)
          
          // Load from localStorage
          const stored = localStorage.getItem(key)
          if (stored) {
            try {
              data.value = JSON.parse(stored)
            } catch {
              data.value = defaultValue
            }
          }
          
          // Watch for changes and save to localStorage
          watch(data, (newValue) => {
            localStorage.setItem(key, JSON.stringify(newValue))
          }, { deep: true })
          
          return { data }
        }
      priority: "medium"

compatibility:
  languages: ["typescript"]
  frameworks: ["vue"]
  rep_version: "^1.0"
