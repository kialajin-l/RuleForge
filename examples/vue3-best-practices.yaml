meta:
  id: vue3-error-boundaries
  name: Vue 3 Error Boundaries and Error Handling
  version: 1.0.0
  description: "Implement proper error boundaries and error handling in Vue 3 applications"
  authors: ["jack"]
  license: MIT
  tags: ["vue3", "error-handling", "error-boundaries", "reliability"]

rule:
  trigger:
    keywords: ["try", "catch", "onErrorCaptured"]
    file_pattern: "**/*.vue"
    language: "typescript"
    
  conditions:
    - type: "code_pattern"
      pattern: "catch\\s*\\([^)]*\\)\\s*\\{"
      negated: false
      
  suggestions:
    - description: "Use onErrorCaptured for component-level error boundaries"
      code: |
        <script setup lang="ts">
        import { ref, onErrorCaptured } from 'vue'
        
        const error = ref<Error | null>(null)
        
        onErrorCaptured((err, instance, info) => {
          error.value = err
          console.error('Error captured:', err, info)
          
          // Prevent error from propagating further
          return false
        })
        
        function clearError() {
          error.value = null
        }
        </script>
        
        <template>
          <div v-if="error" class="error-boundary">
            <h3>Something went wrong</h3>
            <p>{{ error.message }}</p>
            <button @click="clearError">Try again</button>
          </div>
          <slot v-else />
        </template>
      priority: "high"
      
    - description: "Implement global error handler for uncaught errors"
      code: |
        // In main.ts or main.js
        app.config.errorHandler = (err, instance, info) => {
          // Log error to error reporting service
          console.error('Global error:', err, info)
          
          // Show user-friendly error message
          showErrorNotification('An unexpected error occurred')
        }
      priority: "medium"

compatibility:
  languages: ["typescript"]
  frameworks: ["vue"]
  rep_version: "^1.0"
