meta:
  id: vue3-props-validation
  name: Vue 3 Props Validation
  version: 1.0.0
  description: "Use TypeScript interfaces for Vue 3 props validation instead of object literals for better type safety and IntelliSense support"
  authors: ["alice", "bob"]
  license: MIT
  created: "2024-01-15T10:00:00Z"
  updated: "2024-01-20T15:30:00Z"
  tags: ["vue3", "typescript", "props", "validation", "type-safety"]
  references: ["https://vuejs.org/guide/typescript/composition-api.html"]

rule:
  trigger:
    keywords: ["defineProps", "props", "withDefaults"]
    file_pattern: "**/*.vue"
    language: "typescript"
    context: "Vue 3 component props definition"
    
  conditions:
    - type: "code_pattern"
      pattern: "defineProps\\(\\{[^}]*\\}\\)"
      negated: false
      
    - type: "code_contains"
      condition: "defineProps without TypeScript interface"
      negated: false
      
  suggestions:
    - description: "Use TypeScript interface for props with full type safety"
      code: |
        interface Props {
          title: string
          count?: number
          disabled?: boolean
          items?: Array<{ id: number; name: string }>
        }
        
        const props = defineProps<Props>()
      priority: "high"
      
    - description: "Add JSDoc comments for better documentation and IntelliSense"
      code: |
        /**
         * Component props interface
         * @property {string} title - The title of the component
         * @property {number} [count] - Optional count value
         * @property {boolean} [disabled] - Whether the component is disabled
         * @property {Array<{id: number, name: string}>} [items] - Optional items array
         */
        interface Props {
          title: string
          count?: number
          disabled?: boolean
          items?: Array<{ id: number; name: string }>
        }
        
        const props = defineProps<Props>()
      priority: "medium"
      
    - description: "Use withDefaults for default values with TypeScript interface"
      code: |
        interface Props {
          title: string
          count?: number
          disabled?: boolean
        }
        
        const props = withDefaults(defineProps<Props>(), {
          count: 0,
          disabled: false
        })
      priority: "medium"

compatibility:
  languages: ["typescript", "vue"]
  frameworks: ["vue"]
  min_version: "3.3.0"
  max_version: "4.0.0"
  rep_version: "^1.0"
  dependencies:
    vue: ">=3.3"
  environments: ["browser"]
