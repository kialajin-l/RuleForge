meta:
  id: vue3-event-handling
  name: Vue 3 Event Handling Patterns
  version: 1.0.0
  description: "Use typed event handling with defineEmits in Vue 3 components"
  authors: ["emma"]
  license: MIT
  tags: ["vue3", "events", "emits", "type-safety"]

rule:
  trigger:
    keywords: ["$emit", "defineEmits", "emit"]
    file_pattern: "**/*.vue"
    language: "typescript"
    
  conditions:
    - type: "code_pattern"
      pattern: "this\\\\.\\$emit"
      negated: false
      
    - type: "code_pattern"
      pattern: "defineEmits\\(\\s*\\)"
      negated: false
      
  suggestions:
    - description: "Use defineEmits with TypeScript for typed event handling"
      code: |
        // Before (Options API)
        this.$emit('update:modelValue', newValue)
        
        // After (Composition API)
        const emit = defineEmits<{
          (e: 'update:modelValue', value: string): void
          (e: 'submit', formData: FormData): void
          (e: 'cancel'): void
        }>()
        
        emit('update:modelValue', newValue)
      priority: "high"
      
    - description: "Define event payload types for better type safety"
      code: |
        interface UpdateEvent {
          value: string
          isValid: boolean
        }
        
        const emit = defineEmits<{
          (e: 'update', payload: UpdateEvent): void
          (e: 'error', message: string): void
        }>()
      priority: "medium"

compatibility:
  languages: ["typescript"]
  frameworks: ["vue"]
  rep_version: "^1.0"
