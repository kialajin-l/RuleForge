meta:
  id: vue3-component-organization
  name: Vue 3 Component Organization
  version: 1.0.0
  description: "Organize Vue 3 component code with consistent structure and composition API"
  authors: ["frank"]
  license: MIT
  tags: ["vue3", "component", "organization", "structure"]

rule:
  trigger:
    keywords: ["script", "setup", "export"]
    file_pattern: "**/*.vue"
    language: "typescript"
    
  conditions:
    - type: "code_contains"
      condition: "Vue component without consistent organization"
      negated: false
      
  suggestions:
    - description: "Use script setup syntax with consistent import organization"
      code: |
        <script setup lang="ts">
        // 1. Vue imports
        import { ref, reactive, computed } from 'vue'
        
        // 2. Component imports
        import MyComponent from './MyComponent.vue'
        
        // 3. Utility imports
        import { formatDate, validateEmail } from '@/utils'
        
        // 4. Type imports
        import type { User, ApiResponse } from '@/types'
        
        // 5. Props and emits
        interface Props {
          title: string
          user?: User
        }
        
        const props = defineProps<Props>()
        const emit = defineEmits<{
          (e: 'update', value: string): void
        }>()
        
        // 6. Reactive data
        const count = ref(0)
        const userData = reactive({
          name: '',
          email: ''
        })
        
        // 7. Computed properties
        const formattedName = computed(() => 
          userData.name.trim().toUpperCase()
        )
        
        // 8. Methods
        function handleSubmit() {
          // implementation
        }
        
        // 9. Lifecycle hooks
        onMounted(() => {
          // initialization
        })
        </script>
      priority: "medium"

compatibility:
  languages: ["typescript"]
  frameworks: ["vue"]
  rep_version: "^1.0"
