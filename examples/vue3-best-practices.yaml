meta:
  id: vue3-router-guards
  name: Vue 3 Router Navigation Guards
  version: 1.0.0
  description: "Implement Vue Router navigation guards with proper error handling and TypeScript support"
  authors: ["henry"]
  license: MIT
  tags: ["vue3", "router", "navigation-guards", "authentication"]

rule:
  trigger:
    keywords: ["beforeEach", "beforeResolve", "afterEach"]
    file_pattern: "**/router/**/*.ts"
    language: "typescript"
    
  conditions:
    - type: "code_pattern"
      pattern: "router\\.beforeEach\\([^)]*\\)"
      negated: false
      
  suggestions:
    - description: "Use typed navigation guards with proper authentication check"
      code: |
        router.beforeEach((to, from, next) => {
          const authStore = useAuthStore()
          
          // Check if route requires authentication
          if (to.meta.requiresAuth && !authStore.isAuthenticated) {
            next({ 
              name: 'login', 
              query: { redirect: to.fullPath } 
            })
            return
          }
          
          // Check if user has required permissions
          if (to.meta.requiredPermissions) {
            const hasPermission = authStore.hasPermissions(to.meta.requiredPermissions)
            if (!hasPermission) {
              next({ name: 'forbidden' })
              return
            }
          }
          
          next()
        })
      priority: "high"
      
    - description: "Add global error handling for navigation guards"
      code: |
        router.beforeEach(async (to, from, next) => {
          try {
            const authStore = useAuthStore()
            
            // Wait for auth initialization if needed
            if (!authStore.isInitialized) {
              await authStore.initialize()
            }
            
            // Authentication and authorization checks...
            next()
            
          } catch (error) {
            console.error('Navigation guard error:', error)
            next({ name: 'error', query: { message: 'Navigation failed' } })
          }
        })
      priority: "medium"

compatibility:
  languages: ["typescript"]
  frameworks: ["vue", "vue-router"]
  rep_version: "^1.0"
  dependencies:
    "vue-router": ">=4.0"
