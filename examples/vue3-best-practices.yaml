meta:
  id: vue3-performance-optimization
  name: Vue 3 Performance Optimization Patterns
  version: 1.0.0
  description: "Apply performance optimization techniques in Vue 3 applications"
  authors: ["karen"]
  license: MIT
  tags: ["vue3", "performance", "optimization", "memoization"]

rule:
  trigger:
    keywords: ["computed", "watch", "watchEffect"]
    file_pattern: "**/*.vue"
    language: "typescript"
    
  conditions:
    - type: "code_pattern"
      pattern: "computed\\([^)]*\\)"
      negated: false
      
  suggestions:
    - description: "Use computed properties for derived data instead of methods"
      code: |
        // Before
        function getFullName() {
          return `${firstName.value} ${lastName.value}`
        }
        
        // After
        const fullName = computed(() => 
          `${firstName.value} ${lastName.value}`
        )
      priority: "high"
      
    - description: "Use watch with specific dependencies instead of watchEffect"
      code: |
        // Before
        watchEffect(() => {
          // This runs whenever ANY reactive dependency changes
          console.log('Something changed')
        })
        
        // After
        watch([firstName, lastName], ([newFirst, newLast]) => {
          // Only runs when firstName or lastName changes
          console.log('Name changed:', newFirst, newLast)
        })
      priority: "medium"
      
    - description: "Use shallowRef and markRaw for non-reactive objects"
      code: |
        import { shallowRef, markRaw } from 'vue'
        
        // For large objects that don't need deep reactivity
        const largeConfig = shallowRef({
          // configuration object
        })
        
        // For objects that should never be reactive
        const utilityObject = markRaw({
          // utility methods
        })
      priority: "medium"

compatibility:
  languages: ["typescript"]
  frameworks: ["vue"]
  rep_version: "^1.0"