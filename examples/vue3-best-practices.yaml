meta:
  id: vue3-pinia-store
  name: Vue 3 Pinia Store Patterns
  version: 1.0.0
  description: "Use Pinia stores with proper TypeScript typing and composition API patterns"
  authors: ["grace"]
  license: MIT
  tags: ["vue3", "pinia", "state-management", "store"]

rule:
  trigger:
    keywords: ["defineStore", "store", "pinia"]
    file_pattern: "**/*.ts"
    language: "typescript"
    
  conditions:
    - type: "code_pattern"
      pattern: "defineStore\\([^,]*,[^{]*\\)"
      negated: false
      
  suggestions:
    - description: "Use Pinia store with TypeScript interface for state"
      code: |
        interface UserState {
          users: User[]
          currentUser: User | null
          loading: boolean
        }
        
        export const useUserStore = defineStore('user', {
          state: (): UserState => ({
            users: [],
            currentUser: null,
            loading: false
          }),
          
          getters: {
            activeUsers: (state) => state.users.filter(user => user.active),
            getUserById: (state) => (id: number) => 
              state.users.find(user => user.id === id)
          },
          
          actions: {
            async fetchUsers() {
              this.loading = true
              try {
                const response = await api.getUsers()
                this.users = response.data
              } catch (error) {
                console.error('Failed to fetch users:', error)
              } finally {
                this.loading = false
              }
            }
          }
        })
      priority: "high"
      
    - description: "Use composition API style for Pinia stores"
      code: |
        export const useUserStore = defineStore('user', () => {
          const users = ref<User[]>([])
          const currentUser = ref<User | null>(null)
          const loading = ref(false)
          
          const activeUsers = computed(() => 
            users.value.filter(user => user.active)
          )
          
          function getUserById(id: number) {
            return users.value.find(user => user.id === id)
          }
          
          async function fetchUsers() {
            loading.value = true
            try {
              const response = await api.getUsers()
              users.value = response.data
            } catch (error) {
              console.error('Failed to fetch users:', error)
            } finally {
              loading.value = false
            }
          }
          
          return { users, currentUser, loading, activeUsers, getUserById, fetchUsers }
        })
      priority: "medium"

compatibility:
  languages: ["typescript"]
  frameworks: ["vue", "pinia"]
  rep_version: "^1.0"
  dependencies:
    pinia: ">=2.0"
