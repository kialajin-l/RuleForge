meta:
  id: test-driven-development
  name: Test-Driven Development (TDD) Patterns
  version: 1.0.0
  description: "Follow Test-Driven Development practices by writing tests before implementation and iterating through red-green-refactor cycle"
  authors: ["karen"]
  license: MIT
  tags: ["testing", "tdd", "development", "methodology"]

rule:
  trigger:
    keywords: ["TDD", "red-green-refactor", "test-first"]
    file_pattern: "**/test/**/*.ts"
    language: "typescript"
    context: "TDD implementation"
    
  conditions:
    - type: "code_contains"
      condition: "Implementation without corresponding tests"
      negated: false
      
  suggestions:
    - description: "Follow the red-green-refactor cycle for TDD"
      code: |
        // Step 1: Write a failing test (RED)
        test('should add two numbers', () => {
          expect(add(2, 3)).toBe(5) // This will fail initially
        })
        
        // Step 2: Write minimal implementation to pass test (GREEN)
        function add(a: number, b: number): number {
          return a + b // Simple implementation
        }
        
        // Step 3: Refactor while keeping tests green (REFACTOR)
        function add(a: number, b: number): number {
          // More robust implementation
          if (typeof a !== 'number' || typeof b !== 'number') {
            throw new Error('Both arguments must be numbers')
          }
          return a + b
        }
        
        // Add more tests for edge cases
        test('should throw error for non-number inputs', () => {
          expect(() => add('2' as any, 3)).toThrow('Both arguments must be numbers')
        })
      priority: "high"
      
    - description: "Use TDD for API design and interface development"
      code: |
        // Start with the interface you wish you had
        describe('UserService', () => {
          test('should create user with valid data', async () => {
            // Arrange
            const userData = { name: 'John', email: 'john@example.com' }
            
            // Act (this is the API we want)
            const user = await UserService.create(userData)
            
            // Assert
            expect(user.id).toBeDefined()
            expect(user.name).toBe('John')
            expect(user.email).toBe('john@example.com')
          })
          
          test('should validate user data before creation', async () => {
            const invalidData = { name: '', email: 'invalid' }
            
            await expect(UserService.create(invalidData))
              .rejects.toThrow('Invalid user data')
          })
        })
        
