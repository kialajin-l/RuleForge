meta:
  id: test-data-management
  name: Test Data Management Patterns
  version: 1.0.0
  description: "Manage test data effectively using factories, fixtures, and builders for reliable tests"
  authors: ["emma"]
  license: MIT
  tags: ["testing", "test-data", "factories", "fixtures"]

rule:
  trigger:
    keywords: ["factory", "fixture", "builder", "create"]
    file_pattern: "**/test/**/*.ts"
    language: "typescript"
    context: "Test data creation"
    
  conditions:
    - type: "code_pattern"
      pattern: "const\\s+\\w+\\s*=\\s*\\{[^}]*\\}"
      negated: false
      
  suggestions:
    - description: "Use factory functions for creating test data with sensible defaults"
      code: |
        // User factory
        interface User {
          id: number
          name: string
          email: string
          role: 'admin' | 'user'
          createdAt: Date
        }
        
        function createUser(overrides: Partial<User> = {}): User {
          const defaults: User = {
            id: 1,
            name: 'Test User',
            email: 'test@example.com',
            role: 'user',
            createdAt: new Date('2023-01-01')
          }
          
          return { ...defaults, ...overrides }
        }
        
        // Usage in tests
        test('should handle admin users', () => {
          const adminUser = createUser({ role: 'admin' })
          const result = canAccessAdminPanel(adminUser)
          expect(result).toBe(true)
        })
        
        test('should handle users with specific email', () => {
          const user = createUser({ email: 'special@example.com' })
          const result = processUser(user)
          expect(result.email).toBe('special@example.com')
        })
      priority: "high"
      
    - description: "Use builder pattern for complex object creation"
      code: |
        class UserBuilder {
          private user: Partial<User> = {}
          
          withId(id: number): UserBuilder {
            this.user.id = id
            return this
          }
          
          withName(name: string): UserBuilder {
            this.user.name = name
            return this
          }
          
          withEmail(email: string): UserBuilder {
            this.user.email = email
            return this
          }
          
          asAdmin(): UserBuilder {
            this.user.role = 'admin'
            return this
          }
          
          build(): User {
            return createUser(this.user)
          }
        }
        
        // Usage
        const adminUser = new UserBuilder()
          .withId(123)
          .withName('Admin User')
          .withEmail('admin@example.com')
          .asAdmin()
          .build()
      priority: "medium"

compatibility:
  languages: ["typescript", "javascript"]
  frameworks: ["jest", "vitest"]
