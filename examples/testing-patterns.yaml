meta:
  id: performance-testing
  name: Performance Testing Patterns
  version: 1.0.0
  description: "Implement performance testing to ensure application meets performance requirements and identify bottlenecks"
  authors: ["henry"]
  license: MIT
  tags: ["testing", "performance", "benchmark", "optimization"]

rule:
  trigger:
    keywords: ["performance", "benchmark", "time", "memory"]
    file_pattern: "**/test/**/*.ts"
    language: "typescript"
    context: "Performance test implementation"
    
  conditions:
    - type: "code_pattern"
      pattern: "console\\.time\\([^)]*\\)"
      negated: false
      
  suggestions:
    - description: "Use performance testing libraries for accurate measurements"
      code: |
        import { performance } from 'perf_hooks'
        
        describe('Algorithm performance', () => {
          test('should process large dataset efficiently', () => {
            // Arrange
            const largeDataset = Array(100000).fill(0).map((_, i) => i)
            
            // Measure performance
            const startTime = performance.now()
            const startMemory = process.memoryUsage().heapUsed
            
            // Act
            const result = processLargeDataset(largeDataset)
            
            const endTime = performance.now()
            const endMemory = process.memoryUsage().heapUsed
            
            const executionTime = endTime - startTime
            const memoryUsed = endMemory - startMemory
            
            // Assert
            expect(executionTime).toBeLessThan(1000) // Should complete in < 1 second
            expect(memoryUsed).toBeLessThan(50 * 1024 * 1024) // Should use < 50MB
            expect(result).toHaveLength(largeDataset.length)
          })
          
          test('should handle worst-case scenario efficiently', () => {
            const worstCaseData = createWorstCaseScenario(10000)
            
            const start = performance.now()
            const result = processData(worstCaseData)
            const duration = performance.now() - start
            
            // Performance assertion
            expect(duration).toBeLessThan(500) // Max 500ms for worst case
          })
        })
      priority: "high"
      
    - description: "Compare performance between different implementations"
      code: |
        describe('Performance comparison', () => {
          const testData = generateTestData(1000)
          
          function measurePerformance(fn: Function, data: any[]): number {
            const start = performance.now()
            fn(data)
            return performance.now() - start
          }
          
          test('should compare algorithm performance', () => {
            const time1 = measurePerformance(algorithmV1, testData)
            const time2 = measurePerformance(algorithmV2, testData)
            
            // V2 should be at least 20% faster than V1
            expect(time2).toBeLessThan(time1 * 0.8)
          })
        })
      priority: "medium"

compatibility:
  languages: ["typescript", "javascript"]
  frameworks: ["jest", "vitest"]
  rep_version: "^1.0"
