meta:
  id: unit-test-structure
  name: Unit Test Structure and Organization
  version: 1.0.0
  description: "Follow consistent unit test structure with Arrange-Act-Assert pattern and proper test organization"
  authors: ["alice", "bob"]
  license: MIT
  tags: ["testing", "unit-test", "structure", "pytest", "jest"]

rule:
  trigger:
    keywords: ["test", "describe", "it", "should"]
    file_pattern: "**/test/**/*.ts"
    language: "typescript"
    context: "Unit test file structure"
    
  conditions:
    - type: "code_pattern"
      pattern: "test\\([^,]*,[^{]*\\{.*expect\\([^}]*\\)"
      negated: false
      
    - type: "code_contains"
      condition: "Test without clear Arrange-Act-Assert separation"
      negated: false
      
  suggestions:
    - description: "Use Arrange-Act-Assert pattern for clear test structure"
      code: |
        // ✅ Good: Clear AAA pattern
        test('should add two numbers correctly', () => {
          // Arrange
          const a = 5
          const b = 3
          const expected = 8
          
          // Act
          const result = add(a, b)
          
          // Assert
          expect(result).toBe(expected)
        })
        
        // ❌ Bad: Mixed logic
        test('should add two numbers', () => {
          expect(add(5, 3)).toBe(8) // Mixed arrange, act, assert
        })
      priority: "high"
      
    - description: "Organize tests with describe blocks for related functionality"
      code: |
        describe('Calculator', () => {
          describe('add()', () => {
            test('should add positive numbers', () => {
              // Arrange
              const a = 2
              const b = 3
              
              // Act
              const result = add(a, b)
              
              // Assert
              expect(result).toBe(5)
            })
            
            test('should add negative numbers', () => {
              const result = add(-2, -3)
              expect(result).toBe(-5)
            })
          })
          
          describe('subtract()', () => {
            test('should subtract numbers correctly', () => {
              const result = subtract(5, 3)
              expect(result).toBe(2)
            })
          })
        })
      priority: "medium"

compatibility:
  languages: ["typescript", "javascript"]
  frameworks: ["jest", "vitest"]
  rep_version: "^1.0"
