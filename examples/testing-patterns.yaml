meta:
  id: async-testing-patterns
  name: Async Testing Patterns
  version: 1.0.0
  description: "Properly handle asynchronous code in tests with async/await, promises, and proper error handling"
  authors: ["frank"]
  license: MIT
  tags: ["testing", "async", "promises", "error-handling"]

rule:
  trigger:
    keywords: ["async", "await", "Promise", "then"]
    file_pattern: "**/test/**/*.ts"
    language: "typescript"
    context: "Async test implementation"
    
  conditions:
    - type: "code_pattern"
      pattern: "test\\([^,]*,[^{]*async\\s*\\([^}]*\\}\\)"
      negated: false
      
  suggestions:
    - description: "Use async/await for cleaner asynchronous test code"
      code: |
        // ✅ Good: Using async/await
        test('should fetch user data asynchronously', async () => {
          // Arrange
          const userId = 123
          const expectedUser = { id: userId, name: 'Test User' }
          
          // Mock API call
          jest.spyOn(api, 'fetchUser').mockResolvedValue(expectedUser)
          
          // Act
          const user = await getUserById(userId)
          
          // Assert
          expect(user).toEqual(expectedUser)
          expect(api.fetchUser).toHaveBeenCalledWith(userId)
        })
        
        // ❌ Bad: Using promise chains
        test('should fetch user data', () => {
          return getUserById(123).then(user => {
            expect(user.id).toBe(123)
          })
        })
      priority: "high"
      
    - description: "Test both success and error cases for async functions"
      code: |
        test('should handle API errors correctly', async () => {
          // Arrange
          const errorMessage = 'User not found'
          jest.spyOn(api, 'fetchUser').mockRejectedValue(new Error(errorMessage))
          
          // Act & Assert
          await expect(getUserById(999)).rejects.toThrow(errorMessage)
        })
        
        test('should handle timeout scenarios', async () => {
          jest.spyOn(api, 'fetchUser').mockImplementation(
            () => new Promise((resolve) => setTimeout(resolve, 1000))
          )
          
          // Test with timeout
          await expect(getUserById(123)).resolves.toBeDefined()
        })
      priority: "medium"

compatibility:
  languages: ["typescript", "javascript"]
  frameworks: ["jest", "vitest"]
  rep_version: "^1.0"
