meta:
  id: e2e-testing-patterns
  name: E2E Testing Best Practices
  version: 1.0.0
  description: "Implement effective end-to-end testing with proper setup, teardown, and test data management"
  authors: ["david"]
  license: MIT
  tags: ["testing", "e2e", "cypress", "playwright", "integration"]

rule:
  trigger:
    keywords: ["cy.visit", "page.goto", "beforeEach", "afterEach"]
    file_pattern: "**/e2e/**/*.ts"
    language: "typescript"
    context: "E2E test implementation"
    
  conditions:
    - type: "code_pattern"
      pattern: "describe\\([^,]*,[^{]*\\{.*it\\([^}]*\\}\\)"
      negated: false
      
  suggestions:
    - description: "Use proper test setup and teardown with test data isolation"
      code: |
        describe('User Registration', () => {
          beforeEach(() => {
            // Reset database before each test
            cy.task('resetDatabase')
            
            // Visit the application
            cy.visit('/register')
          })
          
          afterEach(() => {
            // Clean up after each test
            cy.clearCookies()
            cy.clearLocalStorage()
          })
          
          it('should register a new user successfully', () => {
            // Arrange
            const testUser = {
              email: 'test@example.com',
              password: 'Password123!',
              name: 'Test User'
            }
            
            // Act
            cy.get('[data-testid=email-input]').type(testUser.email)
            cy.get('[data-testid=password-input]').type(testUser.password)
            cy.get('[data-testid=name-input]').type(testUser.name)
            cy.get('[data-testid=submit-button]').click()
            
            // Assert
            cy.url().should('include', '/dashboard')
            cy.get('[data-testid=welcome-message]')
              .should('contain', `Welcome, ${testUser.name}`)
          })
          
          it('should show validation errors for invalid input', () => {
            cy.get('[data-testid=email-input]').type('invalid-email')
            cy.get('[data-testid=submit-button]').click()
            
            cy.get('[data-testid=email-error]')
              .should('contain', 'Please enter a valid email')
          })
        })
      priority: "high"
      
    - description: "Use Page Object Model for maintainable E2E tests"
      code: |
        class RegistrationPage {
          elements = {
            emailInput: () => cy.get('[data-testid=email-input]'),
            passwordInput: () => cy.get('[data-testid=password-input]'),
            submitButton: () => cy.get('[data-testid=submit-button]'),
            emailError: () => cy.get('[data-testid=email-error]')
          }
          
          visit() {
            cy.visit('/register')
          }
          
          fillForm(user: { email: string; password: string }) {
            this.elements.emailInput().type(user.email)
            this.elements.passwordInput().type(user.password)
          }
          
          submit() {
            this.elements.submitButton().click()
          }
        }
        
        describe('User Registration with POM', () => {
          const registrationPage = new RegistrationPage()
          
          beforeEach(() => {
            registrationPage.visit()
          })
          
          it('should register successfully', () => {
            registrationPage.fillForm({
              email: 'test@example.com',
              password: 'Password123!'
            })
            registrationPage.submit()
            
            cy.url().should('include', '/dashboard')
          })
        })
      priority: "medium"

compatibility:
  languages: ["typescript", "javascript"]
  frameworks: ["cypress", "playwright"]
  rep_version: "^1.0"
