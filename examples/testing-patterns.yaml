meta:
  id: test-mocking-patterns
  name: Test Mocking Best Practices
  version: 1.0.0
  description: "Use proper mocking techniques to isolate units under test and improve test reliability"
  authors: ["charlie"]
  license: MIT
  tags: ["testing", "mocking", "jest", "unit-test"]

rule:
  trigger:
    keywords: ["jest.mock", "vi.mock", "mock", "spyOn"]
    file_pattern: "**/test/**/*.ts"
    language: "typescript"
    context: "Test mocking implementation"
    
  conditions:
    - type: "code_pattern"
      pattern: "jest\\.mock\\([^,]*,[^{]*\\{.*returnValue"
      negated: false
      
  suggestions:
    - description: "Use dependency injection and interface mocking for better testability"
      code: |
        // ✅ Good: Interface-based mocking
        interface UserRepository {
          findById(id: number): Promise<User | null>
          save(user: User): Promise<User>
        }
        
        class UserService {
          constructor(private userRepo: UserRepository) {}
          
          async getUser(id: number): Promise<User> {
            const user = await this.userRepo.findById(id)
            if (!user) {
              throw new Error('User not found')
            }
            return user
          }
        }
        
        // Test with mock
        test('should throw error when user not found', async () => {
          // Arrange
          const mockRepo: UserRepository = {
            findById: jest.fn().mockResolvedValue(null),
            save: jest.fn()
          }
          const service = new UserService(mockRepo)
          
          // Act & Assert
          await expect(service.getUser(1)).rejects.toThrow('User not found')
          expect(mockRepo.findById).toHaveBeenCalledWith(1)
        })
        
        // ❌ Bad: Direct module mocking
        jest.mock('../api', () => ({
          fetchUser: jest.fn().mockResolvedValue(null)
        }))
      priority: "high"
      
    - description: "Use partial mocking for complex dependencies"
      code: |
        // Partial mock example
        const realModule = jest.requireActual('../utils')
        
        jest.mock('../utils', () => ({
          ...realModule,
          complexCalculation: jest.fn().mockReturnValue(42)
        }))
        
        test('should use mocked complex calculation', () => {
          // The rest of the module works normally
          // Only complexCalculation is mocked
        })
      priority: "medium"

compatibility:
  languages: ["typescript", "javascript"]
  frameworks: ["jest", "vitest"]
  rep_version: "^1.0"
