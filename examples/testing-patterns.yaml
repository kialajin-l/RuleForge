meta:
  id: snapshot-testing
  name: Snapshot Testing Patterns
  version: 1.0.0
  description: "Use snapshot testing for UI components and complex data structures to detect unintended changes"
  authors: ["isabella"]
  license: MIT
  tags: ["testing", "snapshot", "ui", "react", "vue"]

rule:
  trigger:
    keywords: ["toMatchSnapshot", "expect\\.snapshot", "snapshot"]
    file_pattern: "**/test/**/*.ts"
    language: "typescript"
    context: "Snapshot test implementation"
    
  conditions:
    - type: "code_pattern"
      pattern: "expect\\([^)]*\\)\\.toMatchSnapshot\\(\\)"
      negated: false
      
  suggestions:
    - description: "Use snapshot testing for UI components with meaningful names"
      code: |
        import { render } from '@testing-library/react'
        
        describe('Button component', () => {
          test('should render primary button correctly', () => {
            const { container } = render(
              <Button variant="primary" onClick={() => {}}>
                Click me
              </Button>
            )
            
            expect(container.firstChild).toMatchSnapshot('primary-button')
          })
          
          test('should render disabled button correctly', () => {
            const { container } = render(
              <Button variant="secondary" disabled onClick={() => {}}>
                Disabled Button
              </Button>
            )
            
            expect(container.firstChild).toMatchSnapshot('disabled-button')
          })
        })
        
        describe('Complex data structures', () => {
          test('should serialize user data correctly', () => {
            const userData = {
              id: 123,
              name: 'John Doe',
              email: 'john@example.com',
              preferences: {
                theme: 'dark',
                notifications: true,
                language: 'en'
              },
              createdAt: new Date('2023-01-01'),
              updatedAt: new Date('2023-01-02')
            }
            
            expect(userData).toMatchSnapshot('user-data-structure')
          })
        })
      priority: "high"
      
    - description: "Use inline snapshots for small, focused tests"
      code: |
        test('should format date correctly', () => {
          const date = new Date('2023-12-25')
          const formatted = formatDate(date)
          
          expect(formatted).toMatchInlineSnapshot(`"December 25, 2023"`)
        })
        
        test('should generate error message', () => {
          const error = new ValidationError('Email is required')
          const message = getErrorMessage(error)
          
          expect(message).toMatchInlineSnapshot(`"Validation failed: Email is required"`)
        })
      priority: "medium"

