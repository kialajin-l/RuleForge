meta:
  id: test-coverage-patterns
  name: Test Coverage and Quality Patterns
  version: 1.0.0
  description: "Achieve meaningful test coverage by testing edge cases, boundary conditions, and error scenarios"
  authors: ["grace"]
  license: MIT
  tags: ["testing", "coverage", "quality", "edge-cases"]

rule:
  trigger:
    keywords: ["coverage", "edge", "boundary", "error"]
    file_pattern: "**/test/**/*.ts"
    language: "typescript"
    context: "Test coverage implementation"
    
  conditions:
    - type: "code_contains"
      condition: "Test missing edge case coverage"
      negated: false
      
  suggestions:
    - description: "Test boundary conditions and edge cases systematically"
      code: |
        describe('validateAge function', () => {
          test.each([
            [0, false],   // Minimum boundary
            [1, true],    // Just above minimum
            [17, false],  // Just below adult age
            [18, true],   // Adult age boundary
            [65, true],   // Normal case
            [120, true],  // High but valid
            [121, false], // Above maximum
            [-1, false]   // Negative (invalid)
          ])('should validate age %i as %s', (age, expected) => {
            expect(validateAge(age)).toBe(expected)
          })
        })
        
        describe('processInput function', () => {
          test.each([
            ['', false],           // Empty string
            ['   ', false],        // Whitespace only
            ['abc', true],         // Normal string
            ['a'.repeat(1000), true], // Long string
            [null, false],         // Null input
            [undefined, false]     // Undefined input
          ])('should process input %s as %s', (input, expected) => {
            expect(processInput(input)).toBe(expected)
          })
        })
      priority: "high"
      
    - description: "Use parameterized tests for similar test scenarios"
      code: |
        // Parameterized test for different user roles
        describe('User permissions', () => {
          test.each([
            ['admin', ['read', 'write', 'delete'], true],
            ['editor', ['read', 'write'], true],
            ['viewer', ['read'], true],
            ['guest', ['read', 'write'], false],
            ['unknown', ['read'], false]
          ])('should %s have %s permissions: %s', 
            (role, permissions, expected) => {
              const user = createUser({ role })
              const result = hasPermissions(user, permissions)
              expect(result).toBe(expected)
            }
          )
        })
      priority: "medium"

compatibility:
  languages: ["typescript", "javascript"]
  frameworks: ["jest", "vitest"]
  rep_version: "^1.0"
