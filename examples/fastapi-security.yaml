meta:
  id: fastapi-dependency-injection
  name: FastAPI Dependency Injection
  version: 1.0.0
  description: "Properly use FastAPI's dependency injection system for clean and testable code"
  authors: ["henry"]
  license: MIT
  tags: ["fastapi", "dependency-injection", "testing", "architecture"]

rule:
  trigger:
    keywords: ["Depends", "def", "async def"]
    file_pattern: "**/*.py"
    language: "python"
    context: "FastAPI dependency usage"
    
  conditions:
    - type: "code_pattern"
      pattern: "def\\s+\\w+\\s*\\([^)]*Depends[^)]*\\)"
      negated: false
      
  suggestions:
    - description: "Use dependency injection for database sessions and service layers"
      code: |
        from fastapi import Depends
        from sqlalchemy.orm import Session
        
        # Database dependency
        def get_db():
            db = SessionLocal()
            try:
                yield db
            finally:
                db.close()
        
        # Service dependency
        def get_user_service(db: Session = Depends(get_db)):
            return UserService(db)
        
        @app.get("/users/{user_id}")
        async def get_user(
            user_id: int,
            user_service: UserService = Depends(get_user_service)
        ):
            user = user_service.get_by_id(user_id)
            if not user:
                raise HTTPException(status_code=404, detail="User not found")
            return user
        
        # Class-based dependency
        class PaginationParams:
            def __init__(self, page: int = 1, limit: int = 100):
                self.page = max(1, page)
                self.limit = min(100, limit)
                self.offset = (self.page - 1) * self.limit
        
        @app.get("/users/")
        async def get_users(pagination: PaginationParams = Depends()):
            return await get_users_from_db(
                offset=pagination.offset,
                limit=pagination.limit
            )
      priority: "high"
      
    - description: "Create reusable dependency chains for complex scenarios"
      code: |
        from fastapi import Depends, HTTPException, status
        
        async def get_current_user(token: str = Depends(oauth2_scheme)):
            # Authentication logic
            return user
        
        async def get_current_active_user(
            current_user: User = Depends(get_current_user)
        ):
            if not current_user.is_active:
                raise HTTPException(status_code=400, detail="Inactive user")
            return current_user
        
        async def get_current_admin_user(
            current_user: User = Depends(get_current_active_user)
        ):
            if not current_user.is_admin:
                raise HTTPException(status_code=403, detail="Not enough permissions")
            return current_user
        
        @app.get("/admin/")
        async def admin_dashboard(admin: User = Depends(get_current_admin_user)):
            return {"message": "Welcome admin"}
      priority: "medium"

compatibility:
  languages: ["python"]
  frameworks: ["fastapi"]
  rep_version: "^1.0"
