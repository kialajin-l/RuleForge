meta:
  id: fastapi-background-tasks
  name: FastAPI Background Tasks
  version: 1.0.0
  description: "Use background tasks for long-running operations to improve API response times"
  authors: ["isabella"]
  license: MIT
  tags: ["fastapi", "background-tasks", "performance", "async"]

rule:
  trigger:
    keywords: ["BackgroundTasks", "task", "async", "await"]
    file_pattern: "**/*.py"
    language: "python"
    context: "Background task implementation"
    
  conditions:
    - type: "code_pattern"
      pattern: "def\\s+\\w+\\s*\\([^)]*\\).*time\\.sleep"
      negated: false
      
  suggestions:
    - description: "Use BackgroundTasks for non-blocking long-running operations"
      code: |
        from fastapi import BackgroundTasks
        
        def send_email_notification(email: str, message: str):
            # Simulate email sending
            time.sleep(2)
            print(f"Email sent to {email}: {message}")
        
        def update_user_statistics(user_id: int):
            # Update user statistics in background
            time.sleep(1)
            print(f"Statistics updated for user {user_id}")
        
        @app.post("/users/")
        async def create_user(
            user: UserCreate,
            background_tasks: BackgroundTasks
        ):
            # Create user immediately
            new_user = await create_user_in_db(user)
            
            # Add background tasks
            background_tasks.add_task(
                send_email_notification, 
                user.email, 
                "Welcome to our service!"
            )
            background_tasks.add_task(
                update_user_statistics, 
                new_user.id
            )
            
            return {"message": "User created", "user_id": new_user.id}
      priority: "high"
      
    - description: "Use Celery for complex background task processing"
      code: |
        from celery import Celery
        
        # Celery configuration
        celery_app = Celery(
            'tasks',
            broker='redis://localhost:6379/0',
            backend='redis://localhost:6379/0'
        )
        
        @celery_app.task
        def process_large_file(file_path: str):
            # Process large file asynchronously
            # This can take minutes or hours
            result = heavy_processing(file_path)
            return result
        
        @app.post("/upload/")
        async def upload_file(file: UploadFile):
            # Save file
            file_path = f"/tmp/{file.filename}"
            with open(file_path, "wb") as f:
                f.write(await file.read())
            
            # Start background processing
            task = process_large_file.delay(file_path)
            
            return {"task_id": task.id, "status": "processing"}
        
        @app.get("/task/{task_id}")
        async def get_task_status(task_id: str):
            task = process_large_file.AsyncResult(task_id)
            return {
                "task_id": task_id,
                "status": task.status,
                "result": task.result if task.ready() else None
            }
      priority: "medium"

compatibility:
  languages: ["python"]
  frameworks: ["fastapi"]
  rep_version: "^1.0"
  dependencies:
    celery: ">=5.0.0"
    redis: ">=4.0.0"
