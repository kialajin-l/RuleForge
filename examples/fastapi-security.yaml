meta:
  id: fastapi-jwt-authentication
  name: FastAPI JWT Authentication
  version: 1.0.0
  description: "Implement secure JWT authentication in FastAPI with proper token validation and error handling"
  authors: ["alice", "bob"]
  license: MIT
  tags: ["fastapi", "jwt", "authentication", "security"]
  references: ["https://fastapi.tiangolo.com/tutorial/security/"]

rule:
  trigger:
    keywords: ["JWT", "authentication", "bearer", "oauth2"]
    file_pattern: "**/*.py"
    language: "python"
    context: "FastAPI authentication implementation"
    
  conditions:
    - type: "code_pattern"
      pattern: "oauth2_scheme\\s*=\\s*OAuth2PasswordBearer"
      negated: false
      
    - type: "code_contains"
      condition: "JWT token validation without proper error handling"
      negated: false
      
  suggestions:
    - description: "Implement secure JWT token validation with proper error handling"
      code: |
        from fastapi import Depends, HTTPException, status
        from fastapi.security import OAuth2PasswordBearer
        from jose import JWTError, jwt
        from pydantic import BaseModel
        
        # JWT configuration
        SECRET_KEY = "your-secret-key"
        ALGORITHM = "HS256"
        ACCESS_TOKEN_EXPIRE_MINUTES = 30
        
        oauth2_scheme = OAuth2PasswordBearer(tokenUrl="token")
        
        class TokenData(BaseModel):
            username: str | None = None
        
        async def get_current_user(token: str = Depends(oauth2_scheme)):
            credentials_exception = HTTPException(
                status_code=status.HTTP_401_UNAUTHORIZED,
                detail="Could not validate credentials",
                headers={"WWW-Authenticate": "Bearer"},
            )
            
            try:
                payload = jwt.decode(token, SECRET_KEY, algorithms=[ALGORITHM])
                username: str = payload.get("sub")
                if username is None:
                    raise credentials_exception
                token_data = TokenData(username=username)
            except JWTError:
                raise credentials_exception
            
            user = await get_user(username=token_data.username)
            if user is None:
                raise credentials_exception
            
            return user
      priority: "high"
      
    - description: "Add token expiration validation and refresh mechanism"
      code: |
        from datetime import datetime, timedelta
        
        def create_access_token(data: dict, expires_delta: timedelta | None = None):
            to_encode = data.copy()
            if expires_delta:
                expire = datetime.utcnow() + expires_delta
            else:
                expire = datetime.utcnow() + timedelta(minutes=15)
            
            to_encode.update({"exp": expire})
            encoded_jwt = jwt.encode(to_encode, SECRET_KEY, algorithm=ALGORITHM)
            return encoded_jwt
        
        def verify_token_expiration(token: str) -> bool:
            try:
                payload = jwt.decode(token, SECRET_KEY, algorithms=[ALGORITHM])
                expiration = datetime.fromtimestamp(payload.get("exp"))
                return datetime.utcnow() < expiration
            except JWTError:
                return False
      priority: "medium"

compatibility:
  languages: ["python"]
  frameworks: ["fastapi"]
  min_version: "0.68.0"
  rep_version: "^1.0"
  dependencies:
    fastapi: ">=0.68.0"
    "python-jose": ">=3.3.0"
    "python-multipart": ">=0.0.5"
