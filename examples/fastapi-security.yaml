meta:
  id: fastapi-logging
  name: FastAPI Logging Configuration
  version: 1.0.0
  description: "Implement comprehensive logging in FastAPI applications for monitoring and debugging"
  authors: ["jack"]
  license: MIT
  tags: ["fastapi", "logging", "monitoring", "debugging"]

rule:
  trigger:
    keywords: ["logging", "logger", "log", "print"]
    file_pattern: "**/*.py"
    language: "python"
    context: "Logging implementation"
    
  conditions:
    - type: "code_pattern"
      pattern: "print\\([^)]*\\)"
      negated: false
      
  suggestions:
    - description: "Use Python's logging module with proper configuration"
      code: |
        import logging
        import sys
        from logging.handlers import RotatingFileHandler
        
        # Configure logging
        logging.basicConfig(
            level=logging.INFO,
            format='%(asctime)s - %(name)s - %(levelname)s - %(message)s',
            handlers=[
                RotatingFileHandler('app.log', maxBytes=1000000, backupCount=5),
                logging.StreamHandler(sys.stdout)
            ]
        )
        
        logger = logging.getLogger(__name__)
        
        @app.middleware("http")
        async def log_requests(request: Request, call_next):
            logger.info(f"Request: {request.method} {request.url}")
            
            response = await call_next(request)
            
            logger.info(f"Response: {response.status_code}")
            return response
        
        @app.get("/users/{user_id}")
        async def get_user(user_id: int):
            logger.info(f"Fetching user {user_id}")
            
            try:
                user = await get_user_from_db(user_id)
                logger.info(f"User {user_id} found")
                return user
            except Exception as e:
                logger.error(f"Error fetching user {user_id}: {e}")
                raise HTTPException(status_code=404, detail="User not found")
      priority: "high"
      
    - description: "Implement structured logging with JSON format for production"
      code: |
        import json
        from pythonjsonlogger import jsonlogger
        
        # JSON formatter for structured logging
        formatter = jsonlogger.JsonFormatter(
            '%(asctime)s %(name)s %(levelname)s %(message)s'
        )
        
        handler = logging.StreamHandler()
        handler.setFormatter(formatter)
        
        logger = logging.getLogger()
        logger.addHandler(handler)
        logger.setLevel(logging.INFO)
        
        # Structured logging example
        logger.info("User action", extra={
            "user_id": 123,
            "action": "login",
            "ip_address": "192.168.1.1",
            "user_agent": "Mozilla/5.0..."
        })
      priority: "medium"

compatibility:
  languages: ["python"]
  frameworks: ["fastapi"]
  rep_version: "^1.0"
  dependencies:
    "python-json-logger": ">=2.0.0"
