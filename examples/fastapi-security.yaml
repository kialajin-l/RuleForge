meta:
  id: fastapi-rate-limiting
  name: FastAPI Rate Limiting
  version: 1.0.0
  description: "Implement rate limiting to protect FastAPI endpoints from abuse and DDoS attacks"
  authors: ["frank"]
  license: MIT
  tags: ["fastapi", "rate-limiting", "security", "performance"]

rule:
  trigger:
    keywords: ["limiter", "rate", "throttle", "cache"]
    file_pattern: "**/*.py"
    language: "python"
    context: "API endpoint protection"
    
  conditions:
    - type: "code_contains"
      condition: "API endpoint without rate limiting"
      negated: false
      
  suggestions:
    - description: "Implement rate limiting using slowapi or similar libraries"
      code: |
        from slowapi import Limiter, _rate_limit_exceeded_handler
        from slowapi.util import get_remote_address
        from slowapi.errors import RateLimitExceeded
        from fastapi import FastAPI, Request
        
        limiter = Limiter(key_func=get_remote_address)
        app = FastAPI()
        app.state.limiter = limiter
        app.add_exception_handler(RateLimitExceeded, _rate_limit_exceeded_handler)
        
        @app.get("/public/")
        @limiter.limit("100/minute")
        async def public_endpoint(request: Request):
            return {"message": "Public endpoint"}
        
        @app.get("/sensitive/")
        @limiter.limit("10/minute")
        async def sensitive_endpoint(request: Request):
            return {"message": "Sensitive endpoint"}
        
        @app.post("/auth/")
        @limiter.limit("5/minute")
        async def auth_endpoint(request: Request):
            return {"message": "Authentication endpoint"}
      priority: "high"
      
    - description: "Implement IP-based rate limiting with Redis for distributed systems"
      code: |
        import redis
        from fastapi import FastAPI, Request, HTTPException
        
        redis_client = redis.Redis(host='localhost', port=6379, db=0)
        
        async def rate_limit(request: Request, key: str, limit: int, window: int):
            """Custom rate limiting implementation"""
            ip = request.client.host
            redis_key = f"rate_limit:{key}:{ip}"
            
            current = redis_client.get(redis_key)
            if current and int(current) >= limit:
                raise HTTPException(
                    status_code=429,
                    detail="Rate limit exceeded"
                )
            
            pipe = redis_client.pipeline()
            pipe.incr(redis_key)
            pipe.expire(redis_key, window)
            pipe.execute()
        
        @app.get("/api/data/")
        async def get_data(request: Request):
            await rate_limit(request, "get_data", 100, 60)  # 100 requests per minute
            return {"data": "your data here"}
      priority: "medium"

compatibility:
  languages: ["python"]
  frameworks: ["fastapi"]
  rep_version: "^1.0"
  dependencies:
    slowapi: ">=0.1.0"
    redis: ">=4.0.0"
