meta:
  id: fastapi-error-handling
  name: FastAPI Error Handling
  version: 1.0.0
  description: "Implement comprehensive error handling in FastAPI with proper HTTP status codes and logging"
  authors: ["grace"]
  license: MIT
  tags: ["fastapi", "error-handling", "logging", "reliability"]

rule:
  trigger:
    keywords: ["try", "except", "HTTPException", "raise"]
    file_pattern: "**/*.py"
    language: "python"
    context: "Error handling in FastAPI"
    
  conditions:
    - type: "code_pattern"
      pattern: "except\\s*:"
      negated: false
      
  suggestions:
    - description: "Use specific exception handling with proper HTTP status codes"
      code: |
        from fastapi import HTTPException, status
        from sqlalchemy.exc import SQLAlchemyError
        
        @app.post("/users/")
        async def create_user(user_data: UserCreate):
            try:
                # Database operation
                user = await create_user_in_db(user_data)
                return user
                
            except ValueError as e:
                # Input validation error
                raise HTTPException(
                    status_code=status.HTTP_400_BAD_REQUEST,
                    detail=str(e)
                )
                
            except SQLAlchemyError as e:
                # Database error
                logger.error(f"Database error: {e}")
                raise HTTPException(
                    status_code=status.HTTP_500_INTERNAL_SERVER_ERROR,
                    detail="Internal server error"
                )
                
            except Exception as e:
                # Generic error (should be logged)
                logger.error(f"Unexpected error: {e}")
                raise HTTPException(
                    status_code=status.HTTP_500_INTERNAL_SERVER_ERROR,
                    detail="Internal server error"
                )
      priority: "high"
      
    - description: "Create custom exception handlers for consistent error responses"
      code: |
        from fastapi import FastAPI, Request
        from fastapi.responses import JSONResponse
        
        class CustomException(Exception):
            def __init__(self, message: str, code: str = "CUSTOM_ERROR"):
                self.message = message
                self.code = code
        
        @app.exception_handler(CustomException)
        async def custom_exception_handler(request: Request, exc: CustomException):
            return JSONResponse(
                status_code=400,
                content={
                    "error": {
                        "code": exc.code,
                        "message": exc.message,
                        "timestamp": datetime.utcnow().isoformat()
                    }
                }
            )
        
        @app.get("/test/")
        async def test_endpoint():
            raise CustomException("Something went wrong", "TEST_ERROR")
      priority: "medium"

compatibility:
  languages: ["python"]
  frameworks: ["fastapi"]
  rep_version: "^1.0"
