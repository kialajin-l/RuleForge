meta:
  id: fastapi-sql-injection
  name: FastAPI SQL Injection Protection
  version: 1.0.0
  description: "Prevent SQL injection attacks by using parameterized queries and ORM properly"
  authors: ["david"]
  license: MIT
  tags: ["fastapi", "sql", "security", "injection"]

rule:
  trigger:
    keywords: ["SELECT", "INSERT", "UPDATE", "DELETE"]
    file_pattern: "**/*.py"
    language: "python"
    context: "Database query execution"
    
  conditions:
    - type: "code_pattern"
      pattern: "f\\s*\"[^\"]*\\$\\{[^}]*\\}[^\"]*\""
      negated: false
      
    - type: "code_pattern"
      pattern: "\\+\\s*\\w+\\s*\\+"
      negated: false
      
  suggestions:
    - description: "Use SQLAlchemy ORM with parameterized queries"
      code: |
        from sqlalchemy import select
        from sqlalchemy.orm import Session
        
        # Safe: Using ORM with parameters
        def get_user_by_email(db: Session, email: str):
            return db.execute(
                select(User).where(User.email == email)
            ).scalar_one_or_none()
        
        # Safe: Using parameterized queries with raw SQL
        def get_users_by_role(db: Session, role: str):
            return db.execute(
                "SELECT * FROM users WHERE role = :role",
                {"role": role}
            ).fetchall()
        
        # UNSAFE: String concatenation (vulnerable to SQL injection)
        def unsafe_get_user(db: Session, username: str):
            return db.execute(f"SELECT * FROM users WHERE username = '{username}'").fetchall()
      priority: "high"
      
    - description: "Use database connection pooling and connection management"
      code: |
        from sqlalchemy import create_engine
        from sqlalchemy.orm import sessionmaker
        
        # Configure database connection with connection pooling
        DATABASE_URL = "postgresql://user:pass@localhost/dbname"
        
        engine = create_engine(
            DATABASE_URL,
            pool_size=10,
            max_overflow=20,
            pool_pre_ping=True,
            pool_recycle=3600
        )
        
        SessionLocal = sessionmaker(autocommit=False, autoflush=False, bind=engine)
        
        # Dependency for database sessions
        def get_db():
            db = SessionLocal()
            try:
                yield db
            finally:
                db.close()
      priority: "medium"

compatibility:
  languages: ["python"]
  frameworks: ["fastapi", "sqlalchemy"]
  rep_version: "^1.0"
  dependencies:
    sqlalchemy: ">=1.4.0"
