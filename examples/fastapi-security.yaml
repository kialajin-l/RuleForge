meta:
  id: fastapi-cors-configuration
  name: FastAPI CORS Configuration
  version: 1.0.0
  description: "Properly configure CORS for FastAPI applications to enable secure cross-origin requests"
  authors: ["emma"]
  license: MIT
  tags: ["fastapi", "cors", "security", "configuration"]

rule:
  trigger:
    keywords: ["CORSMiddleware", "allow_origins", "allow_methods"]
    file_pattern: "**/*.py"
    language: "python"
    context: "FastAPI CORS configuration"
    
  conditions:
    - type: "code_pattern"
      pattern: "allow_origins=\\s*\[\"\\*\"\]"
      negated: false
      
  suggestions:
    - description: "Configure CORS with specific allowed origins instead of wildcard"
      code: |
        from fastapi.middleware.cors import CORSMiddleware
        
        # Secure CORS configuration
        origins = [
            "https://yourdomain.com",
            "https://www.yourdomain.com",
            "http://localhost:3000",
            "http://127.0.0.1:3000"
        ]
        
        app.add_middleware(
            CORSMiddleware,
            allow_origins=origins,
            allow_credentials=True,
            allow_methods=["GET", "POST", "PUT", "DELETE", "OPTIONS"],
            allow_headers=["*"],
            expose_headers=["Content-Range", "X-Content-Range"],
            max_age=600
        )
        
        # UNSECURE: Wildcard origin (not recommended for production)
        # app.add_middleware(
        #     CORSMiddleware,
        #     allow_origins=["*"],  # This allows ALL origins
        #     allow_credentials=True,
        #     allow_methods=["*"],
        #     allow_headers=["*"],
        # )
      priority: "high"
      
    - description: "Use environment variables for CORS configuration"
      code: |
        import os
        
        # Load allowed origins from environment variables
        ALLOWED_ORIGINS = os.getenv(
            "ALLOWED_ORIGINS", 
            "http://localhost:3000,http://127.0.0.1:3000"
        ).split(",")
        
        app.add_middleware(
            CORSMiddleware,
            allow_origins=ALLOWED_ORIGINS,
            allow_credentials=True,
            allow_methods=["GET", "POST", "PUT", "DELETE", "OPTIONS"],
            allow_headers=["Authorization", "Content-Type"],
        )
      priority: "medium"

compatibility:
  languages: ["python"]
  frameworks: ["fastapi"]
  rep_version: "^1.0"
