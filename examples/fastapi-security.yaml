meta:
  id: fastapi-input-validation
  name: FastAPI Input Validation
  version: 1.0.0
  description: "Use Pydantic models for comprehensive input validation in FastAPI endpoints"
  authors: ["charlie"]
  license: MIT
  tags: ["fastapi", "validation", "pydantic", "input"]

rule:
  trigger:
    keywords: ["def", "async def", "Depends", "Body"]
    file_pattern: "**/*.py"
    language: "python"
    context: "FastAPI endpoint definition"
    
  conditions:
    - type: "code_pattern"
      pattern: "def\\s+\\w+\\s*\\([^)]*\\)\\s*:"
      negated: false
      
    - type: "code_pattern"
      pattern: "pydantic\\\.\\w+"
      negated: true
      
  suggestions:
    - description: "Use Pydantic models for request body validation"
      code: |
        from pydantic import BaseModel, EmailStr, constr
        from fastapi import HTTPException
        
        class UserCreate(BaseModel):
            username: constr(min_length=3, max_length=50)
            email: EmailStr
            password: constr(min_length=8)
            age: int = Field(..., gt=0, le=150)
        
        @app.post("/users/")
        async def create_user(user: UserCreate):
            # Input is automatically validated by FastAPI
            # No need for manual validation
            
            # Check if user already exists
            existing_user = await get_user_by_email(user.email)
            if existing_user:
                raise HTTPException(
                    status_code=400,
                    detail="User with this email already exists"
                )
            
            # Create user logic...
            return {"message": "User created successfully"}
      priority: "high"
      
    - description: "Add custom validators for complex validation logic"
      code: |
        from pydantic import validator
        
        class UserCreate(BaseModel):
            username: str
            password: str
            confirm_password: str
        
            @validator('confirm_password')
            def passwords_match(cls, v, values):
                if 'password' in values and v != values['password']:
                    raise ValueError('passwords do not match')
                return v
            
            @validator('password')
            def password_strength(cls, v):
                if len(v) < 8:
                    raise ValueError('password must be at least 8 characters')
                if not any(c.isupper() for c in v):
                    raise ValueError('password must contain at least one uppercase letter')
                if not any(c.isdigit() for c in v):
                    raise ValueError('password must contain at least one digit')
                return v
      priority: "medium"

